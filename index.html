<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NURMEDIA | ULTRA NEON</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00f2ff;
            --pink: #ff007a;
            --bg: #020205;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Orbitron', sans-serif;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 242, 255, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 122, 0.05) 0%, transparent 20%);
        }

        /* Glitch Effect Logo */
        .header {
            padding: 40px;
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-family: 'Syncopate', sans-serif;
            font-size: 35px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 10px;
            color: #fff;
            text-shadow: 2px 2px var(--pink), -2px -2px var(--neon);
            animation: glitch 3s infinite;
        }

        /* Categories Bar */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 20px;
            overflow-x: auto;
            white-space: nowrap;
        }

        .tab {
            padding: 12px 25px;
            border: 1px solid var(--neon);
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
            transition: 0.3s;
            background: rgba(0, 242, 255, 0.05);
            color: var(--neon);
        }

        .tab.active, .tab:hover {
            background: var(--neon);
            color: #000;
            box-shadow: 0 0 20px var(--neon);
        }

        /* Ultra Movie Grid */
        .container { padding: 40px; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 40px; 
        }

        /* Hologram Card */
        .movie-card {
            position: relative;
            height: 380px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .movie-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(0deg, var(--bg) 10%, transparent 100%);
        }

        .movie-card:hover {
            transform: translateY(-10px) scale(1.05);
            border-color: var(--pink);
            box-shadow: 0 0 30px rgba(255, 0, 122, 0.3);
            background: rgba(255, 0, 122, 0.05);
        }

        /* Animated Hologram Sticker */
        .sticker-wrapper {
            font-size: 100px;
            margin-bottom: 20px;
            z-index: 2;
            position: relative;
            transition: 0.5s;
        }

        .movie-card:hover .sticker-wrapper {
            transform: rotateY(180deg) scale(1.2);
            filter: drop-shadow(0 0 20px var(--pink));
        }

        .sticker-wrapper::before {
            content: '';
            position: absolute;
            width: 150%; height: 10px;
            background: var(--neon);
            bottom: -10px; left: -25%;
            filter: blur(15px);
            opacity: 0.5;
        }

        .movie-info {
            position: absolute;
            bottom: 30px;
            text-align: center;
            z-index: 3;
            width: 100%;
        }

        .movie-title {
            font-size: 18px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
            color: #fff;
        }

        .movie-cat {
            font-size: 10px;
            color: var(--neon);
            font-family: sans-serif;
            font-weight: bold;
        }

        /* Play Icon Overlay */
        .play-overlay {
            position: absolute;
            top: 20px; right: 20px;
            color: var(--pink);
            font-size: 20px;
            opacity: 0.5;
        }

        /* Video Modal */
        #modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            padding: 50px;
        }

        .video-box {
            width: 100%;
            height: 100%;
            border: 2px solid var(--neon);
            box-shadow: 0 0 50px var(--neon);
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: -40px; right: 0;
            color: var(--neon);
            cursor: pointer;
            font-size: 20px;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 2px var(--pink), -2px -2px var(--neon); }
            50% { text-shadow: -2px 2px var(--pink), 2px -2px var(--neon); }
            100% { text-shadow: 2px 2px var(--pink), -2px -2px var(--neon); }
        }

    </style>
</head>
<body>

        function filter(cat, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

            if(cat === 'Barchasi') {
                Object.keys(movies).forEach(c => data.push(...movies[c]));
            } else {
                data = movies[cat];
            }
            
            grid.innerHTML = data.map(m => `

                    <div class="sticker-wrapper">${m.s}</div>

                        <div class="movie-title">${m.t}</div>
                        <div class="movie-cat">${cat} // ULTRA HD</div>
                    </div>

            `).join('');
        }

        function openM(v) {
            document.getElementById('player').src = `https://www.youtube.com/embed/${v}?autoplay=1`;
            document.getElementById('modal').style.display = 'block';
        }

        function closeM() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('player').src = "";
        }

        filter('Barchasi', document.querySelector('.tab'));
